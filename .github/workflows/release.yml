name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          TAG_COMMIT="$(git rev-parse "${{ github.ref_name }}^{commit}")"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "Tag ${{ github.ref_name }} is not on origin/main — aborting release."
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify release notes exist
        run: |
          NOTES="release-notes/${{ github.ref_name }}.md"
          if [ ! -f "$NOTES" ]; then
            echo "Error: $NOTES not found."
            echo "Release notes are authored per-version under release-notes/<tag>.md."
            echo "See /cut-release skill or scripts/cut-release.sh for the publication flow."
            exit 1
          fi

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --release-notes release-notes/${{ github.ref_name }}.md
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_RELEASE_TOKEN }}

      - name: Announce release on Discussions
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"

          # Fetch repo ID and Announcements category ID in a single GraphQL call
          QUERY_RESULT=$(gh api graphql -f query='
            query {
              repository(owner: "handarbeit", name: "fabrik") {
                id
                discussionCategories(first: 100) {
                  nodes {
                    id
                    name
                  }
                }
              }
            }
          ')

          REPO_ID=$(echo "$QUERY_RESULT" | jq -r '.data.repository.id')
          CATEGORY_ID=$(echo "$QUERY_RESULT" | jq -r '.data.repository.discussionCategories.nodes[] | select(.name == "Announcements") | .id')

          if [ -z "$REPO_ID" ] || [ "$REPO_ID" = "null" ]; then
            echo "Error: could not fetch handarbeit/fabrik repository ID"
            exit 1
          fi
          if [ -z "$CATEGORY_ID" ] || [ "$CATEGORY_ID" = "null" ]; then
            echo "Error: could not find Announcements category in handarbeit/fabrik"
            exit 1
          fi

          # Build announcement body from release-notes/<version>.md.
          #
          # If the notes have a "## Summary" section, post just that body — the
          # rest of the release detail lives on the GitHub Release page. If no
          # Summary section is present (older release-notes files), fall back to
          # a link-only announcement.
          BODY_CONTENT=$(awk '
            /^## Summary[[:space:]]*$/ { in_summary = 1; next }
            in_summary && /^## / { in_summary = 0 }
            in_summary { print }
          ' "release-notes/${VERSION}.md" | awk 'NF { p = 1 } p')

          if [ -z "$BODY_CONTENT" ]; then
            BODY_CONTENT="See the release notes for details."
          fi

          BODY="${BODY_CONTENT}

          See the [full release notes and downloads](https://github.com/handarbeit/fabrik/releases/tag/${VERSION}) for binaries and complete changelog."

          # Post the Discussion to handarbeit/fabrik Announcements
          RESULT=$(gh api graphql \
            -f query='
              mutation($repositoryId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
                createDiscussion(input: {
                  repositoryId: $repositoryId,
                  categoryId: $categoryId,
                  title: $title,
                  body: $body
                }) {
                  discussion {
                    url
                  }
                }
              }
            ' \
            -f repositoryId="$REPO_ID" \
            -f categoryId="$CATEGORY_ID" \
            -f title="Fabrik ${VERSION} released" \
            -f body="$BODY")

          DISCUSSION_URL=$(echo "$RESULT" | jq -r '.data.createDiscussion.discussion.url')
          if [ -z "$DISCUSSION_URL" ] || [ "$DISCUSSION_URL" = "null" ]; then
            echo "Error: createDiscussion mutation did not return a discussion URL"
            echo "GraphQL response: $RESULT"
            exit 1
          fi
          echo "Announcement posted: $DISCUSSION_URL"
