name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          TAG_COMMIT="$(git rev-parse "${{ github.ref_name }}^{commit}")"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "Tag ${{ github.ref_name }} is not on origin/main — aborting release."
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify release notes exist
        run: |
          if [ ! -f release-notes.md ]; then
            echo "Error: release-notes.md not found."
            echo "Run scripts/draft-release-notes.sh, review the output, and commit it before tagging."
            exit 1
          fi

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --release-notes release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_REPO_RELEASE_TOKEN }}

      - name: Announce release on Discussions
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"

          # Fetch repo ID and Announcements category ID in a single GraphQL call
          QUERY_RESULT=$(gh api graphql -f query='
            query {
              repository(owner: "shadoworg", name: "fabrik") {
                id
                discussionCategories(first: 100) {
                  nodes {
                    id
                    name
                  }
                }
              }
            }
          ')

          REPO_ID=$(echo "$QUERY_RESULT" | jq -r '.data.repository.id')
          CATEGORY_ID=$(echo "$QUERY_RESULT" | jq -r '.data.repository.discussionCategories.nodes[] | select(.name == "Announcements") | .id')

          if [ -z "$REPO_ID" ] || [ "$REPO_ID" = "null" ]; then
            echo "Error: could not fetch shadoworg/fabrik repository ID"
            exit 1
          fi
          if [ -z "$CATEGORY_ID" ] || [ "$CATEGORY_ID" = "null" ]; then
            echo "Error: could not find Announcements category in shadoworg/fabrik"
            exit 1
          fi

          # Build announcement body from release-notes.md:
          # skip line 1 (title), stop at ## Internal or ## Upgrading
          BODY_CONTENT=$(awk '
            NR == 1 { next }
            /^## Internal/ || /^## Upgrading/ { exit }
            { print }
          ' release-notes.md)

          BODY="${BODY_CONTENT}

See the [full release notes and downloads](https://github.com/shadoworg/fabrik/releases/tag/${VERSION}) for binaries and complete changelog."

          # Post the Discussion to shadoworg/fabrik Announcements
          RESULT=$(gh api graphql \
            -f query='
              mutation($repositoryId: ID!, $categoryId: ID!, $title: String!, $body: String!) {
                createDiscussion(input: {
                  repositoryId: $repositoryId,
                  categoryId: $categoryId,
                  title: $title,
                  body: $body
                }) {
                  discussion {
                    url
                  }
                }
              }
            ' \
            -f repositoryId="$REPO_ID" \
            -f categoryId="$CATEGORY_ID" \
            -f title="Fabrik ${VERSION} released" \
            -f body="$BODY")

          DISCUSSION_URL=$(echo "$RESULT" | jq -r '.data.createDiscussion.discussion.url')
          if [ -z "$DISCUSSION_URL" ] || [ "$DISCUSSION_URL" = "null" ]; then
            echo "Error: createDiscussion mutation did not return a discussion URL"
            echo "GraphQL response: $RESULT"
            exit 1
          fi
          echo "Announcement posted: $DISCUSSION_URL"
