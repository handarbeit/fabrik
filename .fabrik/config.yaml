# .fabrik/config.yaml — project-level configuration for Fabrik
# Commit this file to git so project settings travel with the repo.
# Keep secrets (FABRIK_TOKEN, GITHUB_TOKEN) in .env (gitignored).
#
# Precedence: CLI flag > shell env var > .env > .fabrik/config.yaml > built-in default

# Required: GitHub repository owner (org or username)
owner: handarbeit

# Required: GitHub repository name (leave empty for multi-repo mode)
# repo: fabrik

# Required: GitHub project number (the number in the project URL)
project: 1

# Required: Your GitHub username (Fabrik only processes issues assigned to you)
user: arbeithand

# Optional settings (defaults shown):
# stages: ./.fabrik/stages
poll: 15
max_concurrent: 5
# max_retries: 3
# yolo: false
auto_upgrade: true
# Re-enabled 2026-05-05 after the cache-coherency cluster landed (Phase 3-A through 3-H,
# plus #537 single-Store unification). Verification per docs/cache-refactor/04-phase4-audit.md §6.
webhooks: true
board_cache_mode: in-memory
tui: true
terminal: ghostty
# debug_output: false
