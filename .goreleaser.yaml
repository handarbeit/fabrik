version: 2

builds:
  - id: fabrik
    binary: fabrik
    goos:
      - darwin
      - linux
    goarch:
      - arm64
      - amd64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/handarbeit/fabrik/cmd.Version={{.Version}}

archives:
  - id: fabrik
    name_template: "fabrik_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^Merge "

release:
  draft: false
  prerelease: auto
