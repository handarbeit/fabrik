title: Fabrik
description: >-
  Automated Claude Code SDLC driver powered by GitHub Issues and Projects.
  Fabrik watches your GitHub Project board and drives Claude Code through
  configurable pipeline stages — Research, Plan, Implement, Review, Validate.
url: "https://tenaciousvc.github.io"
baseurl: "/fabrik"
github_username: tenaciousvc
github_repo: fabrik

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Sass
sass:
  sass_dir: assets/css
  style: compressed

# Exclude from build — developer docs coexist in this directory
# but are not part of the Jekyll site
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - USER_GUIDE.md
  - stage-lifecycle.md
  - specs/
