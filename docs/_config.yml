title: Fabrik
description: >-
  Automated Claude Code SDLC driver powered by GitHub Issues and Projects.
  Fabrik watches your GitHub Project board and drives Claude Code through
  configurable pipeline stages — Research, Plan, Implement, Review, Validate.
url: "https://fabrik.handarbeit.io"
baseurl: ""
github_username: handarbeit
github_repo: fabrik

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Sass
sass:
  sass_dir: assets/css
  style: compressed

# Exclude from build
# Only curated, user-facing docs are published to fabrik.handarbeit.io.
# Internal engineering docs (design explorations, postmortems, competitive
# analysis, historical specs) live in the repo but must NOT be served on the
# marketing site.
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - competitive
  - postmortems
  - cache-refactor
  - design
  - specs
